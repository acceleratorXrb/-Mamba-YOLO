# Mamba-YOLO VisDrone-VID Dataset Configuration
# VisDrone-VID: Video-based Object Detection in Drone Imagery
# https://github.com/VisDrone/VisDrone-Dataset
#
# Annotation format (10 fields):
#   frame_index, target_id, bbox_left, bbox_top, bbox_width, bbox_height, score, category, truncation, occlusion
#
# Dataset structure after setup.sh:
#   VisDrone-VID/
#     images/
#       train/
#       val/
#       test/
#     labels/
#       train/
#       val/
#       test/

path: /home/xrb/桌面/mamba-yolo/datasets/VisDrone-VID
train: images/train
val: images/val
test: images/test

# VisDrone-VID Classes (10 categories, same as DET)
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor

nc: 10

download: |
  import os
  import zipfile
  import shutil
  from pathlib import Path
  from PIL import Image

  dir = Path(yaml['path'])

  # Google Drive file IDs
  files = {
      'train': '1NSNapZQHar22OYzQYuXCugA3QlMndzvw',
      'val':   '1xuG7Z3IhVfGGKMe3Yj6RnrFHqo_d2a1B',
      'test':  '1-BEq--FcjshTF1UwUabby_LHhYj41os5',
  }

  import gdown
  for split, fid in files.items():
      zip_path = dir / f'VisDrone2019-VID-{split}.zip'
      if not zip_path.exists():
          gdown.download(f'https://drive.google.com/uc?id={fid}', str(zip_path), quiet=False)
      if not zip_path.exists():
          continue
      with zipfile.ZipFile(zip_path, 'r') as zf:
          zf.extractall(dir)

  def convert_vid2yolo(split_name, dst_name):
      """Convert VisDrone-VID annotations to YOLO format.
      VID format: frame_index, target_id, bbox_left, bbox_top, bbox_width, bbox_height, score, category, truncation, occlusion
      """
      split_dir = dir / split_name
      if not split_dir.exists():
          return

      dst_img = dir / 'images' / dst_name
      dst_lbl = dir / 'labels' / dst_name
      dst_img.mkdir(parents=True, exist_ok=True)
      dst_lbl.mkdir(parents=True, exist_ok=True)

      for img_file in sorted(split_dir.glob('**/*.jpg')) + sorted(split_dir.glob('**/*.png')):
          if 'labels' in str(img_file.parent) or 'annotations' in str(img_file.parent):
              continue
          ann_file = img_file.with_suffix('.txt')
          if not ann_file.exists():
              ann_file = split_dir / 'annotations' / f'{img_file.stem}.txt'
          if not ann_file.exists():
              continue

          try:
              img_size = Image.open(img_file).size
          except Exception:
              continue

          dw, dh = 1.0 / img_size[0], 1.0 / img_size[1]

          lines = []
          with open(ann_file, 'r') as f:
              for line in f:
                  parts = line.strip().split(',')
                  if len(parts) < 10:
                      continue
                  score = int(parts[6])
                  category = int(parts[7])
                  if score == 0 and category == 0:
                      continue  # skip ignored regions
                  cls = category - 1
                  if cls < 0 or cls >= 10:
                      continue  # skip 'others' (11)
                  x1, y1, w, h = map(float, parts[2:6])
                  xc = (x1 + w / 2) * dw
                  yc = (y1 + h / 2) * dh
                  nw = w * dw
                  nh = h * dh
                  lines.append(f'{cls} {xc:.6f} {yc:.6f} {nw:.6f} {nh:.6f}\n')

          if lines:
              with open(dst_lbl / f'{img_file.stem}.txt', 'w') as f:
                  f.writelines(lines)
              shutil.copy2(img_file, dst_img / img_file.name)

      n = len(list(dst_img.glob('*')))
      print(f'  {split_name} → {dst_name}: {n} images')

  convert_vid2yolo('VisDrone2019-VID-train', 'train')
  convert_vid2yolo('VisDrone2019-VID-val', 'val')
  convert_vid2yolo('VisDrone2019-VID-test-dev', 'test')

  # Cleanup
  for d in dir.iterdir():
      if d.is_dir() and d.name.startswith('VisDrone2019-VID-') and d.name not in ('images', 'labels'):
          shutil.rmtree(d, ignore_errors=True)
